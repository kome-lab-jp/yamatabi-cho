<!DOCTYPE html>

<title>編集 — 山旅帖</title>

<script>
'use strict';

const DB_KEY = 'yamatabi_plans';
const params = new URLSearchParams(location.search);
const planId = params.get('id');
if (!planId) { location.replace('index.html'); }

function loadPlans() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { return []; }
}
function savePlansArr(plans) {
  const json = JSON.stringify(plans);
  if (json.length > 4.5 * 1024 * 1024) {
    showToast('⚠️ データが上限に近づいています。ダッシュボードからエクスポートしてください。', 'error');
  }
  try {
    localStorage.setItem(DB_KEY, json);
  } catch (e) {
    showToast('保存に失敗しました。ストレージ容量を確認してください。', 'error');
  }
}
function loadPlan() {
  return loadPlans().find(p => p.id === planId) || null;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ── Form helpers ──
function getFormData() {
  const data = { basic:{}, move:{}, food:{}, stay:{}, onsen:{}, gourmet:{}, cost:{}, reg:{}, safety:{} };
  document.querySelectorAll('[name]').forEach(el => {
    const parts = el.name.split('.');
    if (parts.length === 2) data[parts[0]][parts[1]] = el.value;
  });
  return data;
}

function setFormData(data) {
  if (!data) return;
  Object.entries(data).forEach(([section, fields]) => {
    Object.entries(fields).forEach(([key, val]) => {
      const el = document.querySelector(`[name="${section}.${key}"]`);
      if (el) el.value = val || '';
    });
  });
  updateCalc();
}

// ── Calculator live update ──
const COST_FIELDS = ['cost-members','cost-distance','cost-costPerKm','cost-highway','cost-fuelPrice','cost-fuelEff','cost-parking','cost-tentPerPerson','cost-other'];
COST_FIELDS.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', updateCalc);
});

function getCostData() {
  const get = id => document.getElementById(id)?.value || '';
  return {
    members: get('cost-members'), distance: get('cost-distance'),
    costPerKm: get('cost-costPerKm'), highway: get('cost-highway'),
    fuelPrice: get('cost-fuelPrice'), fuelEff: get('cost-fuelEff'),
    parking: get('cost-parking'), tentPerPerson: get('cost-tentPerPerson'),
    other: get('cost-other')
  };
}

function fmt(n) { return '¥' + n.toLocaleString('ja-JP'); }

function updateCalc() {
  const c = Calculator.compute(getCostData());
  document.getElementById('calc-carCost').textContent  = c.carCost  ? fmt(c.carCost)  : '—';
  document.getElementById('calc-fuelCost').textContent = c.fuelCost ? fmt(c.fuelCost) : '—';
  document.getElementById('calc-tentTotal').textContent= c.tentTotal? fmt(c.tentTotal): '—';
  document.getElementById('calc-total').textContent    = fmt(c.total);
  document.getElementById('calc-per').textContent      = fmt(c.perPerson);
  updatePreview();
}

// ── Accordion ──
function toggleAcc(header) {
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');
  header.classList.toggle('open', !isOpen);
  header.setAttribute('aria-expanded', String(!isOpen));
  body.classList.toggle('open', !isOpen);
}

// ── Preview ──
let previewMode = 'desktop';

function setPreview(mode) {
  previewMode = mode;
  document.getElementById('prev-desktop').classList.toggle('active', mode === 'desktop');
  document.getElementById('prev-mobile').classList.toggle('active', mode === 'mobile');
  document.getElementById('preview-inner').classList.toggle('mobile-view', mode === 'mobile');
  updatePreview();
}

function updatePreview() {
  const plan = buildCurrentPlan();
  const { html } = Template.generate(plan);
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const body = doc.body.innerHTML;
  document.getElementById('preview-content').innerHTML = body;
  document.getElementById('topbar-title').textContent =
    plan.data?.basic?.title || '新しい計画書';
}

function buildCurrentPlan() {
  const base = loadPlan() || { id: planId, status: 'draft', publicUrl: '', updatedAt: new Date().toISOString() };
  base.data = getFormData();
  return base;
}

// ── Save ──
function savePlan() {
  const plans = loadPlans();
  const idx = plans.findIndex(p => p.id === planId);
  const plan = buildCurrentPlan();
  plan.updatedAt = new Date().toISOString();
  if (idx >= 0) plans[idx] = plan;
  else plans.unshift(plan);
  savePlansArr(plans);
  showToast('💾 保存しました');
}

document.getElementById('save-btn').addEventListener('click', savePlan);

// Auto-save on input (debounced)
let saveTimer;
document.querySelectorAll('.form-input, .form-textarea').forEach(el => {
  el.addEventListener('input', () => {
    updatePreview();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(savePlan, 1500);
  });
});

// ── Publish ──
document.getElementById('publish-btn').addEventListener('click', () => {
  savePlan();
  const plan = buildCurrentPlan();
  Publisher.showPublishModal(plan, (slug, publicUrl) => {
    const plans = loadPlans();
    const idx = plans.findIndex(p => p.id === planId);
    if (idx >= 0) {
      plans[idx].status = 'published';
      plans[idx].publicUrl = publicUrl;
      savePlansArr(plans);
    }
    showToast('📄 HTMLをダウンロードしました。plansフォルダに移動してpushしてください。');
  });
});

// ── AI Search ──
function getDescentPlace() {
  return document.getElementById('move-place')?.value
    || document.getElementById('basic-title')?.value
    || '下山場所';
}

function aiSearchOnsen() {
  const place = getDescentPlace();
  const prompt = `${place}から車で30分以内にある温泉を探してください。条件：Googleマップのクチコミ評価が高い・入湯料が税込1,500円以下・アクセスしやすい。温泉名・住所・料金・Googleマップリンク・クチコミ評価・おすすめポイントをまとめてください。`;
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank', 'noopener');
}

function aiSearchGourmet() {
  const place = getDescentPlace();
  const prompt = `${place}周辺のご当地グルメで人気の高いお店を3〜5件教えてください。条件：車で30分以内・地元で有名・Googleマップ評価が高い。店名・ジャンル・おすすめメニュー・住所・営業時間・Googleマップリンクをまとめてください。`;
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank', 'noopener');
}

// ── Mobile tab switch ── (display controlled by CSS media query)
function initMobileTabs() {}

document.querySelectorAll('.editor-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const showPreview = tab.dataset.tab === 'preview';
    document.getElementById('editor-wrap').classList.toggle('show-preview', showPreview);
    if (showPreview) updatePreview();
  });
});

window.addEventListener('resize', initMobileTabs);

// ── Init ──
window.YAMATABI_SITE_URL = Publisher.getSiteUrl();

const existing = loadPlan();
if (existing) setFormData(existing.data);
updatePreview();
initMobileTabs();
</script>
